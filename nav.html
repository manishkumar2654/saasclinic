<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saas Clinic - Premium Navbar</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      :root {
        --nav-border: rgba(15, 118, 110, 0.12);
        --nav-bg: rgba(255, 255, 255, 0.72);
        --nav-bg-strong: rgba(255, 255, 255, 0.88);
        --nav-text: #0f172a;
        --nav-soft: #475569;
        --nav-primary: #0f766e;
        --nav-primary-dark: #115e59;
        --nav-ring: rgba(20, 184, 166, 0.18);
        --nav-shadow:
          0 18px 50px -30px rgba(15, 23, 42, 0.20),
          0 10px 24px -18px rgba(15, 23, 42, 0.10);
      }

      body {
        background: transparent;
      }

      #siteNav {
        transition:
          background 0.3s ease,
          box-shadow 0.3s ease,
          border-color 0.3s ease,
          transform 0.3s ease;
      }

      .nav-shell {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.78),
          rgba(255, 255, 255, 0.66)
        );
        border: 1px solid var(--nav-border);
        box-shadow: var(--nav-shadow);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
      }

      .nav-logo-box {
        background: linear-gradient(135deg, #ffffff, #f0fdfa);
        border: 1px solid rgba(15, 118, 110, 0.12);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.8),
          0 10px 24px -18px rgba(15, 23, 42, 0.18);
      }

      .nav-link {
        position: relative;
        color: #334155;
        transition: color 0.25s ease, transform 0.25s ease;
      }

      .nav-link:hover {
        color: var(--nav-primary);
      }

      .nav-link:hover .nav-underline {
        width: 100%;
      }

      .nav-underline {
        transition: width 0.3s ease;
        background: linear-gradient(90deg, #14b8a6, #0ea5e9);
      }

      .nav-link.active {
        color: var(--nav-primary);
        font-weight: 700;
      }

      .nav-link.active .nav-underline {
        width: 100%;
      }

      .nav-btn {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        box-shadow:
          0 16px 30px -18px rgba(15, 118, 110, 0.45),
          0 10px 20px -16px rgba(15, 23, 42, 0.20);
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease;
      }

      .nav-btn:hover {
        transform: translateY(-1px);
        background: linear-gradient(135deg, #115e59, #0f766e);
        box-shadow:
          0 20px 34px -18px rgba(15, 118, 110, 0.42),
          0 12px 22px -16px rgba(15, 23, 42, 0.18);
      }

      .nav-btn:active {
        transform: scale(0.98);
      }

      .menu-btn {
        transition:
          transform 0.25s ease,
          background 0.25s ease,
          box-shadow 0.25s ease;
      }

      .menu-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 24px -16px rgba(15, 23, 42, 0.18);
      }

      .mobile-panel {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(255, 255, 255, 0.84)
        );
        border: 1px solid rgba(15, 118, 110, 0.10);
        box-shadow:
          0 24px 48px -26px rgba(15, 23, 42, 0.22),
          0 14px 28px -18px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      .m-link {
        position: relative;
        transition:
          background 0.25s ease,
          color 0.25s ease,
          padding-left 0.25s ease;
      }

      .m-link:hover {
        background: rgba(240, 253, 250, 0.95);
        color: var(--nav-primary);
        padding-left: 1.35rem;
      }

      .m-link.active {
        color: var(--nav-primary);
        font-weight: 700;
        background: linear-gradient(90deg, rgba(20,184,166,0.08), rgba(14,165,233,0.04));
      }

      .m-link.active::before {
        content: "";
        position: absolute;
        left: 0.65rem;
        top: 50%;
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 999px;
        background: linear-gradient(135deg, #14b8a6, #0ea5e9);
        transform: translateY(-50%);
      }

      .brand-sub {
        color: #64748b;
      }

      .brand-title {
        letter-spacing: -0.02em;
      }

      a:focus-visible,
      button:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 2px rgba(255,255,255,0.76),
          0 0 0 6px var(--nav-ring),
          0 0 0 1px rgba(15, 118, 110, 0.25);
        border-radius: 14px;
      }
    </style>
  </head>

  <body class="bg-transparent">
    <header id="siteNav" class="fixed top-0 left-0 right-0 z-[9999] w-full px-2 sm:px-4 pt-3">
      <nav class="mx-auto max-w-7xl">
        <div class="nav-shell rounded-[24px] px-4 sm:px-6 lg:px-8">
          <div class="flex h-20 items-center justify-between">

            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3 min-w-0">
              <div class="nav-logo-box h-12 w-12 rounded-2xl flex items-center justify-center shrink-0">
                <span class="bg-gradient-to-r from-teal-700 to-cyan-600 bg-clip-text text-transparent font-extrabold text-base">
                  SC
                </span>
              </div>

              <div class="min-w-0">
                <div class="brand-title text-lg sm:text-xl font-extrabold text-slate-900 leading-tight truncate">
                  Saas Clinic
                </div>
                <div class="brand-sub text-xs sm:text-sm leading-tight truncate">
                  Because We Respect Life
                </div>
              </div>
            </a>

            <!-- Desktop Nav -->
            <div class="hidden lg:flex items-center gap-8">
              <ul class="flex items-center gap-7 text-slate-700 font-semibold">
                <li>
                  <a data-nav="index.html" href="index.html" class="nav-link relative py-2">
                    Home
                    <span class="nav-underline absolute left-0 -bottom-1 h-0.5 w-0 rounded-full"></span>
                  </a>
                </li>
                <li>
                  <a data-nav="about.html" href="about.html" class="nav-link relative py-2">
                    About
                    <span class="nav-underline absolute left-0 -bottom-1 h-0.5 w-0 rounded-full"></span>
                  </a>
                </li>
                <li>
                  <a data-nav="saas.html" href="saas.html" class="nav-link relative py-2">
                    SAAS
                    <span class="nav-underline absolute left-0 -bottom-1 h-0.5 w-0 rounded-full"></span>
                  </a>
                </li>
                <li>
                  <a data-nav="DrPrakharAgarwal.html" href="DrPrakharAgarwal.html" class="nav-link relative py-2">
                    Dr. Prakhar Agarwal
                    <span class="nav-underline absolute left-0 -bottom-1 h-0.5 w-0 rounded-full"></span>
                  </a>
                </li>
                <li>
                  <a data-nav="DrKirtiKadian.html" href="DrKirtiKadian.html" class="nav-link relative py-2">
                    Dr. Kirti Kadian
                    <span class="nav-underline absolute left-0 -bottom-1 h-0.5 w-0 rounded-full"></span>
                  </a>
                </li>
              </ul>

              <a
                data-nav="contact.html"
                href="contact.html"
                class="nav-btn inline-flex items-center gap-2 rounded-2xl px-5 py-3 text-white font-bold"
              >
                Contact Us
              </a>
            </div>

            <!-- Mobile Button -->
            <button
              id="menuBtn"
              class="menu-btn lg:hidden inline-flex items-center justify-center rounded-2xl border border-slate-200 bg-white/80 p-2.5 text-slate-900 shadow-sm hover:bg-white"
              aria-label="Open menu"
              aria-expanded="false"
              type="button"
            >
              <svg id="iconOpen" class="h-6 w-6" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <svg id="iconClose" class="hidden h-6 w-6" viewBox="0 0 24 24" fill="none">
                <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <!-- Mobile Menu -->
          <div id="mobileMenu" class="lg:hidden hidden pb-5">
            <div class="mobile-panel overflow-hidden rounded-[22px]">
              <ul class="flex flex-col text-slate-700 font-semibold py-2">
                <li><a data-nav="index.html" href="index.html" class="m-link block px-4 py-3">Home</a></li>
                <li><a data-nav="about.html" href="about.html" class="m-link block px-4 py-3">About</a></li>
                <li><a data-nav="saas.html" href="saas.html" class="m-link block px-4 py-3">SAAS</a></li>
                <li><a data-nav="DrPrakharAgarwal.html" href="DrPrakharAgarwal.html" class="m-link block px-4 py-3">Dr. Prakhar Agarwal</a></li>
                <li><a data-nav="DrKirtiKadian.html" href="DrKirtiKadian.html" class="m-link block px-4 py-3">Dr. Kirti Kadian</a></li>
                <li><a data-nav="contact.html" href="contact.html" class="m-link block px-4 py-3">Contact Us</a></li>
              </ul>
            </div>
          </div>

        </div>
      </nav>
    </header>

    <script type="module" src="./nav.js"></script>
  </body>
</html>
